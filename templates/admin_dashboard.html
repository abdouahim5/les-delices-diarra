<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Produits</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1>Gestion des produits</h1>
        <div>
            <a href="{{ url_for('home') }}">Voir le site</a>
            <a href="{{ url_for('admin_logout') }}">Déconnexion</a>
        </div>
    </div>

    {% for item in menu %}
    <div class="admin-product">
        <img src="{{ url_for('static', filename='images/' + item.image) }}" alt="{{ item.name }}">

        <div>
            <h3>{{ item.name }}</h3>
            <p>{{ item.category }} — {{ item.price }} FCFA</p>

            {% if item.active %}
            <strong class="active">Actif</strong>
            {% else %}
            <strong class="inactive">Désactivé</strong>
            {% endif %}
        </div>

        <form method="POST">
            <input type="hidden" name="product_name" value="{{ item.name }}">

            {% if item.active %}
            <button type="submit" class="disable-btn">Désactiver</button>
            {% else %}
            <button type="submit" class="enable-btn">Activer</button>
            {% endif %}
        </form>
    </div>
    {% endfor %}
</div>

</body>
</html>
